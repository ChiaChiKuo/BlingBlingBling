<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Calendar</title>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background: #fff;
    }
    #calendar {
      max-width: 1000px;
      margin: auto;
    }
    .legend {
      display: flex;
      gap: 16px;
      max-width: 1000px;
      margin: 0 auto 16px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #555;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    #detail-panel {
      display: none;
      max-width: 1000px;
      margin: 20px auto 0;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 16px 20px;
      background: #fafafa;
    }
    #detail-panel.visible {
      display: block;
    }
    .detail-type-badge {
      display: inline-block;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 6px;
      margin-bottom: 10px;
      font-weight: bold;
    }
    #detail-info {
      font-size: 14px;
      color: #444;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #detail-date {
      font-size: 12px;
      color: #999;
      margin-top: 10px;
    }
    #detail-close {
      float: right;
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #999;
    }
  </style>
</head>
<body>

<a href="{{ '/student' if role == 'student' else '/teacher' }}">
  <button style="margin-bottom: 15px; padding: 8px 12px;">← Back</button>
</a>

<h2>Welcome {{ user_name }} ({{ 'Student' if role == 'student' else 'Teacher' }})</h2>

<div class="legend">
  <div class="legend-item"><div class="dot" style="background:#378ADD"></div>Assignment Notifications</div>
  <div class="legend-item"><div class="dot" style="background:#1D9E75"></div>Exam Notifications</div>
  <div class="legend-item"><div class="dot" style="background:#D85A30"></div>Course Change Notifications</div>
</div>

<div id="calendar"></div>

<div id="detail-panel">
  <button id="detail-close" onclick="document.getElementById('detail-panel').classList.remove('visible')">✕</button>
  <span id="detail-type-badge" class="detail-type-badge"></span>
  <div id="detail-info"></div>
  <div id="detail-date"></div>
</div>

<script>
const TYPE_COLORS = {
  '作業通知':     '#378ADD',
  '考試通知':  '#1D9E75',
  '課程異動通知':     '#D85A30',
};

function colorForType(type) {
  return TYPE_COLORS[type] || '#888780';
}

document.addEventListener('DOMContentLoaded', function () {
  var calendarEl = document.getElementById('calendar');

  var calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    locale: 'en',

    events: function(info, successCallback, failureCallback) {
      fetch('/events')
        .then(r => r.json())
        .then(data => {
          const events = data.map(e => ({
            title: e.title,
            start: e.start,
            color: colorForType(e.type),
            extendedProps: {
              type: e.type || '公告',
              information: e.information || e.title,
            }
          }));
          successCallback(events);
        })
        .catch(failureCallback);
    },

    eventClick: function(info) {
      const props = info.event.extendedProps;
      const type  = props.type || '公告';
      const color = colorForType(type);

      const badge = document.getElementById('detail-type-badge');
      badge.textContent = type;
      badge.style.background = color + '22';
      badge.style.color = color;
      badge.style.border = '1px solid ' + color + '66';

      document.getElementById('detail-info').textContent =
        props.information || info.event.title;

      document.getElementById('detail-date').textContent =
        '日期：' + info.event.startStr;

      document.getElementById('detail-panel').classList.add('visible');
      document.getElementById('detail-panel').scrollIntoView({
        behavior: 'smooth',
        block: 'nearest'
      });
    }
  });

  calendar.render();
});
</script>

</body>
</html>
