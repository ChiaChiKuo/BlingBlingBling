<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國立中山大學 學習平台 - 登入</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div id="login-page">
  <div class="login-wrap">
    <div class="login-left">
      <h1>國立中山大學</h1>
      <div class="login-illo">
        <div class="illo-screen">
          <div class="illo-line"></div>
          <div class="illo-line"></div>
          <div class="illo-line"></div>
          <div class="illo-line"></div>
          <div class="illo-card">📚</div>
        </div>
        <div class="illo-person">
          <div class="illo-head"></div>
          <div class="illo-body"></div>
        </div>
        <div class="illo-plant">🪴</div>
      </div>
    </div>

    <div class="login-card">
      <h2>帳號密碼登入</h2>

      <form method="POST" action="/login">
        <div class="login-field">
          <span class="field-icon">👥</span>
          <select name="role" required>
            <option value="student">👨‍🎓 學生登入</option>
            <option value="teacher">👩‍🏫 教師登入</option>
          </select>
        </div>

        <div class="login-field">
          <span class="field-icon">👤</span>
          <input type="text" name="user_id" placeholder="學號 / 教師編號" required>
        </div>

        <div class="login-field">
          <span class="field-icon">🔒</span>
          <input type="password" name="password" placeholder="密碼" required>
        </div>

        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}

        <button type="submit" class="btn-login">登入</button>
      </form>

      <div class="login-hint">
        <strong>📌 測試帳號</strong><br>
        學生：B0111111111 / Amy111<br>
        學生：B0111111112 / Andy112<br>
        教師：T123456789 / T12345pclo<br>
        教師：T192837465 / T19283Har
      </div>
    </div>
  </div>

  <div class="login-footer">
    Copyright © 2026 國立中山大學 學習平台
  </div>
</div>

</body>
</html>
